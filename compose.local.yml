services:
  fastapi:
    build:
      context: .
      dockerfile: ./compose/local/fastapi/Dockerfile
    image: searchmark_api_local_fastapi
    container_name: searchmark_api_local_fastapi
    ports:
      - "8000:80"
    env_file:
      - .envs/.local/.postgres
      - .envs/.local/.fastapi
    volumes:
      - .:/app:z
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      valkey:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    volumes:
      - local_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    build:
      context: .
      dockerfile: compose/production/postgres/Dockerfile
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
      - local_postgres_data_backups:/backups
    env_file:
      - .envs/.local/.postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  local_valkey_data:
  local_postgres_data:
  local_postgres_data_backups:
